apiVersion: v1
kind: ConfigMap
metadata:
  name: stellarswipe-config
  namespace: stellarswipe
  labels:
    app.kubernetes.io/name: stellarswipe-api
    app.kubernetes.io/component: config
data:
  # Application
  NODE_ENV: "production"
  PORT: "3000"
  HOST: "0.0.0.0"

  # Database connection (non-sensitive)
  DATABASE_HOST: "postgres-svc"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "stellarswipe"
  DATABASE_SYNCHRONIZE: "false"
  DATABASE_LOGGING: "false"
  DATABASE_SSL: "true"
  DATABASE_POOL_MIN: "10"
  DATABASE_POOL_MAX: "30"
  DATABASE_POOL_IDLE_TIMEOUT: "30000"
  DATABASE_POOL_CONNECTION_TIMEOUT: "2000"

  # Redis connection (non-sensitive)
  REDIS_HOST: "redis-svc"
  REDIS_PORT: "6379"
  REDIS_DB: "0"

  # Stellar network
  STELLAR_NETWORK: "mainnet"
  STELLAR_HORIZON_URL: "https://horizon.stellar.org"
  STELLAR_SOROBAN_RPC_URL: "https://soroban-rpc.stellar.org"
  STELLAR_NETWORK_PASSPHRASE: "Public Global Stellar Network ; September 2015"

  # Observability
  TRACING_ENABLED: "true"
  JAEGER_OTLP_ENDPOINT: "http://jaeger-collector-svc:4318/v1/traces"

  # Rate limiting
  THROTTLE_TTL: "60"
  THROTTLE_LIMIT: "100"
