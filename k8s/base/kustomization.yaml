apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: stellarswipe

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - configmap.yaml
  - secret.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - hpa.yaml
  - pdb.yaml

# Common labels applied to every resource in this base
commonLabels:
  app.kubernetes.io/part-of: stellarswipe
  app.kubernetes.io/managed-by: kustomize
