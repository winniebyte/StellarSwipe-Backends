# IMPORTANT: Replace every <base64-encoded-value> placeholder with the actual
# base64-encoded secret before applying. Never commit real secrets to git.
#
# Encode a value:
#   echo -n 'my-secret-value' | base64
#
# For production, manage secrets with:
#   - External Secrets Operator (AWS Secrets Manager / GCP Secret Manager)
#   - Sealed Secrets (Bitnami)
#   - HashiCorp Vault Agent Injector
#
# This file provides the schema only. The actual Secret object should be
# created via your secrets management pipeline, not from this file directly.
apiVersion: v1
kind: Secret
metadata:
  name: stellarswipe-secrets
  namespace: stellarswipe
  labels:
    app.kubernetes.io/name: stellarswipe-api
    app.kubernetes.io/component: secret
  annotations:
    # Prevent kubectl diff / apply from printing secret values in logs
    kubectl.kubernetes.io/last-applied-configuration: ""
type: Opaque
data:
  # PostgreSQL
  # echo -n 'postgres-user' | base64
  DATABASE_USER: <base64-encoded-value>
  # echo -n 'postgres-password' | base64
  DATABASE_PASSWORD: <base64-encoded-value>
  # echo -n 'postgresql://user:pass@postgres-svc:5432/stellarswipe?sslmode=require' | base64
  DATABASE_URL: <base64-encoded-value>

  # Redis
  # echo -n 'redis-password' | base64
  REDIS_PASSWORD: <base64-encoded-value>

  # JWT
  # echo -n 'your-256-bit-jwt-secret' | base64
  JWT_SECRET: <base64-encoded-value>
  JWT_EXPIRES_IN: <base64-encoded-value>

  # Sentry error tracking
  # echo -n 'https://xxx@sentry.io/project-id' | base64
  SENTRY_DSN: <base64-encoded-value>

  # XAI / AI provider key
  XAI_API_KEY: <base64-encoded-value>
