apiVersion: v1
kind: Service
metadata:
  name: stellarswipe-api-svc
  namespace: stellarswipe
  labels:
    app.kubernetes.io/name: stellarswipe-api
    app.kubernetes.io/component: service
  annotations:
    # Expose Prometheus metrics scraping
    prometheus.io/scrape: "true"
    prometheus.io/port: "3000"
    prometheus.io/path: "/api/v1/metrics"
spec:
  # ClusterIP — traffic enters via the Ingress, not directly via LoadBalancer.
  # Use LoadBalancer only for staging/production overlays that need a cloud LB.
  type: ClusterIP
  selector:
    app: stellarswipe-api
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http   # named port on the container
  # Session affinity improves WebSocket / long-poll connections
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800   # 3 hours
