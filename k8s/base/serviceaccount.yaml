apiVersion: v1
kind: ServiceAccount
metadata:
  name: stellarswipe-api
  namespace: stellarswipe
  labels:
    app.kubernetes.io/name: stellarswipe-api
    app.kubernetes.io/component: serviceaccount
  annotations:
    # If using AWS EKS with IRSA, set the IAM role ARN here:
    # eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/stellarswipe-api-role
    #
    # If using GKE with Workload Identity, set the GSA here:
    # iam.gke.io/gcp-service-account: stellarswipe-api@project-id.iam.gserviceaccount.com
automountServiceAccountToken: false
